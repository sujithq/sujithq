name: Generate Contribution Flavors

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  space-shooter:
    name: Generate Space Shooter Game
    runs-on: ubuntu-latest
    steps:
      # - uses: actions/checkout@v4

      - uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'

      - name: Upload space shooter artifact
        uses: actions/upload-artifact@v4
        with:
          name: space-shooter
          path: game.gif

  snake:
    name: Generate Snake Game
    runs-on: ubuntu-latest
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00A4EF&color_dots=#F25022,#7FBA00,#FFB900,#00A4EF,#737373
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FFB900&color_dots=#0B0F19,#2D2D2D,#00A4EF,#7FBA00,#F25022

      - name: Upload snake artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake
          path: dist/

  pacman:
    name: Generate Pacman Game
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: pacman
          path: dist/

  push-artifacts:
    name: Push Artifacts
    needs: [space-shooter, snake, pacman]
    runs-on: ubuntu-latest
    steps:
      - name: Download space shooter artifact
        uses: actions/download-artifact@v4
        with:
          name: space-shooter
          path: dist-space-shooter/

      - name: push game.gif to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output-space-shooter
          build_dir: dist-space-shooter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download snake artifact
        uses: actions/download-artifact@v4
        with:
          name: snake
          path: dist-snake/

      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file> , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output-snake
          build_dir: dist-snake
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download pacman artifact
        uses: actions/download-artifact@v4
        with:
          name: pacman
          path: dist-pacman/

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output-pacman
          build_dir: dist-pacman
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}